<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert-Money-2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <main>
        <label>
            Converter <b>de</b>
            <select>
                <option>R$ Real brasileiro</option>
            </select>
        </label>

        <label>
            Converter <b>para</b>
            <select class="currency-select">
                <option value="dolar">US$ Dólar americano</option>
                <option value="euro">€ Euro</option>
                <option value="libra">£ Libra</option>
            </select>
        </label>

        <label>
            <span>Valor</span>
            <input class="input-currency" placeholder="R$10.000,00">
        </label>
        <button class="conver-button">Converter</button>

        <section>
            <div class="currency-box">
                <img src="./assets/brasil.png" alt="logo-moeda-para-converter">
                <p class="currency">Real</p>
                <P class="currency-value-to-convert">R$ 0,00</P>
            </div>

            <img class="seta" src="./assets/gifseta.gif" alt="seta-animada">

            <div class="currency-box">
                <img class="currencyimgtroca" src="./assets/eua.png" alt="logo-moeda-convertida">
                <P class="currency" id="currency-change">Dólar Americano</P>
                <P class="currency-value">US$ 0,00</P>
            </div>
        </section>
    </main>

</body>
<script src="./scripts.js"></script>

</html>
